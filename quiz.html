<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator - SmartStudy</title>

    <script src="env-config.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .hero-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fadeInUp { animation: fadeInUp 0.8s ease-out forwards; }
        .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
        
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        
        .option-button { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .option-button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .option-button.selected { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); border-color: #0ea5e9; }
        .option-button.correct { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); border-color: #22c55e; }
        .option-button.incorrect { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-color: #ef4444; }
        
        .quiz-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        
        [x-cloak] { display: none; }
    </style>
</head>
<body class="hero-gradient min-h-screen" x-data="quizApp()">
    <!-- Floating Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-white/10 rounded-full animate-float"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-white/10 rounded-full animate-float" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/3 w-48 h-48 bg-white/5 rounded-full animate-float" style="animation-delay: 4s;"></div>
    </div>

    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="./smartstudy_landing_page.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="brain-circuit" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-2xl font-bold text-white">SmartStudy</span>
                </a>
                <a href="./student_dashboard.html" class="glass-effect text-white px-6 py-2 rounded-full font-semibold hover:bg-white/20 transition-all">
                    Back to Dashboard
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 relative z-10">
        <div class="max-w-4xl mx-auto">
            
            <!-- Setup State -->
            <section x-show="state === 'setup'" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 transform scale-95" x-transition:enter-end="opacity-100 transform scale-100">
                <div class="quiz-card p-12 rounded-3xl text-center animate-fadeInUp">
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-6 inline-block rounded-2xl mb-8">
                        <i data-lucide="file-question" class="w-16 h-16 text-white"></i>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-6">AI-Powered Quiz Generator</h1>
                    <p class="text-xl text-gray-600 mb-12 max-w-2xl mx-auto">Enter any topic and let our AI create a personalized 20-question quiz to test your knowledge and accelerate your learning.</p>
                    
                    <form @submit.prevent="generateQuiz" class="max-w-2xl mx-auto">
                        <div class="flex flex-col md:flex-row gap-4 mb-6">
                            <input type="text" x-model="topic" placeholder="e.g., The American Civil War, JavaScript Fundamentals..." 
                                class="flex-1 px-6 py-4 text-lg border-2 border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-200 focus:border-blue-500 transition-all bg-white/80 backdrop-blur" 
                                required :disabled="loading">
                            <button type="submit" class="btn-primary text-white px-8 py-4 rounded-2xl font-bold text-lg inline-flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed animate-pulse-slow" :disabled="loading">
                                <span x-show="!loading">Generate Quiz</span>
                                <span x-show="loading" class="flex items-center space-x-2">
                                    <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    <span>Generating...</span>
                                </span>
                            </button>
                        </div>
                        <div x-show="error" x-cloak class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-lg" x-text="error"></div>
                    </form>
                </div>
            </section>

            <!-- Quiz State -->
            <section x-show="state === 'quiz'" x-cloak>
                <div class="quiz-card p-8 rounded-3xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800" x-text="quizData.topic"></h2>
                        <div class="font-semibold text-gray-600" x-text="`Question ${currentQuestionIndex + 1} of ${quizData.questions.length}`"></div>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="w-full bg-gray-200 rounded-full h-3 mb-8">
                        <div class="btn-primary h-3 rounded-full transition-all duration-500" :style="`width: ${((currentQuestionIndex + 1) / quizData.questions.length) * 100}%`"></div>
                    </div>

                    <!-- Question -->
                    <div x-show="quizData.questions.length > 0">
                        <h3 class="text-2xl font-semibold text-gray-700 mb-8" x-text="quizData.questions[currentQuestionIndex].questionText"></h3>
                        <div class="grid gap-4 mb-8">
                            <template x-for="(option, index) in quizData.questions[currentQuestionIndex].options" :key="index">
                                <button @click="selectAnswer(index)" class="option-button text-left p-6 border-2 border-gray-200 rounded-2xl text-lg font-medium"
                                    :class="{ 'selected': userAnswers[currentQuestionIndex] === index }">
                                    <span class="inline-block w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold text-center leading-8 mr-4" x-text="String.fromCharCode(65 + index)"></span>
                                    <span x-text="option.text"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                    
                    <!-- Navigation -->
                    <div class="flex justify-between">
                        <button @click="prevQuestion" :disabled="currentQuestionIndex === 0" 
                            class="glass-effect text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-white/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            Previous
                        </button>
                        <button x-show="currentQuestionIndex < quizData.questions.length - 1" @click="nextQuestion" 
                            class="btn-primary text-white px-6 py-3 rounded-xl font-semibold">
                            Next Question
                        </button>
                        <button x-show="currentQuestionIndex === quizData.questions.length - 1" @click="submitQuiz" 
                            class="bg-gradient-to-r from-green-500 to-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:shadow-lg transition-all">
                            Submit Quiz
                        </button>
                    </div>
                </div>
            </section>

            <!-- Results State -->
            <section x-show="state === 'results'" x-cloak>
                <div class="quiz-card p-12 rounded-3xl text-center mb-8">
                    <div class="bg-gradient-to-r from-green-500 to-emerald-600 p-6 inline-block rounded-2xl mb-8">
                        <i data-lucide="trophy" class="w-16 h-16 text-white"></i>
                    </div>
                    <h2 class="text-4xl font-bold text-gray-800 mb-4">Quiz Complete!</h2>
                    <p class="text-xl text-gray-600 mb-8" x-text="`Topic: ${quizData.topic}`"></p>
                    
                    <div class="mb-8">
                        <p class="text-lg text-gray-500 mb-2">Your Score</p>
                        <p class="text-6xl font-extrabold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-4" x-text="`${score}/${quizData.questions.length}`"></p>
                        <p class="text-2xl font-bold" :class="score / quizData.questions.length >= 0.7 ? 'text-green-500' : 'text-amber-500'" x-text="getResultMessage()"></p>
                    </div>

                    <button @click="resetQuiz" class="btn-primary text-white px-8 py-4 rounded-2xl font-bold text-lg">
                        Take Another Quiz
                    </button>
                </div>

                <div class="quiz-card p-8 rounded-3xl">
                    <h3 class="text-2xl font-bold text-gray-800 mb-6">Review Your Answers</h3>
                    <div class="space-y-6">
                        <template x-for="(question, index) in quizData.questions" :key="index">
                            <div class="border-b border-gray-200 pb-6 last:border-b-0">
                                <p class="font-semibold text-gray-700 mb-4" x-text="`${index + 1}. ${question.questionText}`"></p>
                                <div class="grid gap-3 mb-4">
                                    <template x-for="(option, optIndex) in question.options" :key="optIndex">
                                        <div class="option-button flex items-center p-4 border-2 rounded-xl"
                                             :class="{
                                                 'correct': optIndex === question.correctAnswerIndex,
                                                 'incorrect': userAnswers[index] === optIndex && optIndex !== question.correctAnswerIndex
                                             }">
                                            <i x-show="optIndex === question.correctAnswerIndex" data-lucide="check-circle-2" class="w-5 h-5 mr-3 text-green-600"></i>
                                            <i x-show="userAnswers[index] === optIndex && optIndex !== question.correctAnswerIndex" data-lucide="x-circle" class="w-5 h-5 mr-3 text-red-500"></i>
                                            <span x-text="option.text"></span>
                                        </div>
                                    </template>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <p class="font-semibold text-gray-800 mb-2">Explanation:</p>
                                    <p class="text-gray-600" x-text="question.explanation"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        lucide.createIcons();
        
        function quizApp() {
            return {
                state: 'setup',
                topic: '',
                loading: false,
                error: '',
                quizData: { topic: '', questions: [] },
                currentQuestionIndex: 0,
                userAnswers: [],
                score: 0,
                
                async generateQuiz() {
                    if (!this.topic.trim()) return;
                    this.loading = true;
                    this.error = '';
                    
                    const systemPrompt = `You are an expert test creator for the SmartStudy platform. Your task is to generate a comprehensive multiple-choice quiz with exactly 20 questions on a given topic. For each question, provide four distinct options, with only one being correct. Also, provide a brief but clear explanation for why the correct answer is right. Ensure the questions range in difficulty from easy to challenging to provide a thorough assessment.`;
                    const userQuery = `Generate a quiz on: "${this.topic}"`;
                    const apiKey = GOOGLE_API_KEY;

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;

                    const payload = {
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    topic: { type: "STRING" },
                                    questions: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                questionNumber: { type: "NUMBER" },
                                                questionText: { type: "STRING" },
                                                options: {
                                                    type: "ARRAY",
                                                    items: { type: "OBJECT", properties: { text: { type: "STRING" } } }
                                                },
                                                correctAnswerIndex: { type: "NUMBER" },
                                                explanation: { type: "STRING" }
                                            },
                                            required: ["questionNumber", "questionText", "options", "correctAnswerIndex", "explanation"]
                                        }
                                    }
                                },
                                required: ["topic", "questions"]
                            }
                        }
                    };

                    try {
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`API error: ${response.statusText}`);
                        const result = await response.json();
                        const jsonText = result.candidates[0].content.parts[0].text;
                        this.quizData = JSON.parse(jsonText);
                        this.userAnswers = Array(this.quizData.questions.length).fill(null);
                        this.state = 'quiz';
                        this.$nextTick(() => lucide.createIcons());
                    } catch (err) {
                        console.error(err);
                        this.error = "Sorry, we couldn't generate the quiz. Please try a different topic or try again later.";
                    } finally {
                        this.loading = false;
                    }
                },
                
                selectAnswer(index) {
                    this.userAnswers[this.currentQuestionIndex] = index;
                },

                nextQuestion() {
                    if (this.currentQuestionIndex < this.quizData.questions.length - 1) {
                        this.currentQuestionIndex++;
                    }
                },

                prevQuestion() {
                    if (this.currentQuestionIndex > 0) {
                        this.currentQuestionIndex--;
                    }
                },

                submitQuiz() {
                    this.calculateScore();
                    this.state = 'results';
                    this.$nextTick(() => lucide.createIcons());
                },
                
                calculateScore() {
                    this.score = this.userAnswers.reduce((acc, answer, index) => {
                        return answer === this.quizData.questions[index].correctAnswerIndex ? acc + 1 : acc;
                    }, 0);
                },

                getResultMessage() {
                    const percentage = this.score / this.quizData.questions.length;
                    if (percentage >= 0.9) return "Outstanding! 🏆";
                    if (percentage >= 0.7) return "Great Work! 🎉";
                    if (percentage >= 0.5) return "Good Effort! 👍";
                    return "Keep Learning! 📚";
                },

                resetQuiz() {
                    this.state = 'setup';
                    this.topic = '';
                    this.quizData = { topic: '', questions: [] };
                    this.currentQuestionIndex = 0;
                    this.userAnswers = [];
                    this.score = 0;
                    this.error = '';
                }
            }
        }
    </script>
</body>
</html>
